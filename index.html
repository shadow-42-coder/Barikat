<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEVEN Companion</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#121212;
color:white;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
}

h1{
text-align:center;
font-size:42px;
margin-bottom:10px;
color:#ffcc00;
}

.subtitle{
text-align:center;
margin-bottom:25px;
color:#ccc;
}

.card{
background:#1f1f1f;
padding:15px;
border-radius:15px;
margin-bottom:15px;
}

input,select{
width:100%;
padding:12px;
margin-top:8px;
margin-bottom:12px;
border:none;
border-radius:10px;
font-size:16px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

.startBtn{
background:#ffcc00;
color:black;
}

.player{
background:#1f1f1f;
padding:15px;
border-radius:15px;
margin-bottom:15px;
}

.player h2{
margin-bottom:10px;
}

.stats{
font-size:24px;
margin:10px 0;
}

.controls{
display:flex;
gap:10px;
margin-bottom:10px;
}

.controls button{
flex:1;
}

.plus{
background:#22c55e;
color:white;
}

.minus{
background:#ef4444;
color:white;
}

.tur{
text-align:center;
font-size:28px;
margin-bottom:20px;
}

.hidden{
display:none;
}
</style>
</head>
<body>

<div class="container">

<div id="setup">

<h1>SEVEN</h1>
<div class="subtitle">Companion App</div>

<div class="card">

<label>Oyun Modu</label>

<select id="mode">
<option value="solo">Herkes Tek</option>
<option value="team">Takım Savaşı (2v2)</option>
</select>

<input id="p1" placeholder="Oyuncu 1 (Zorunlu)">
<input id="p2" placeholder="Oyuncu 2 (Zorunlu)">
<input id="p3" placeholder="Oyuncu 3 (İsteğe Bağlı)">
<input id="p4" placeholder="Oyuncu 4 (İsteğe Bağlı)">

<button class="startBtn" onclick="startGame()">OYUNU BAŞLAT</button>

</div>
</div>

<div id="game" class="hidden">

<div class="tur">
Tur: <span id="turn">1</span>
</div>

<div class="controls">
<button class="minus" onclick="changeTurn(-1)">- Tur</button>
<button class="plus" onclick="changeTurn(1)">+ Tur</button>
</div>

<div id="players"></div>

<button class="startBtn" onclick="location.reload()">Yeni Oyun</button>

</div>

</div>

<script>

let players=[];

function startGame(){

const p1=document.getElementById("p1").value.trim();
const p2=document.getElementById("p2").value.trim();
const p3=document.getElementById("p3").value.trim();
const p4=document.getElementById("p4").value.trim();

if(!p1 || !p2){
alert("En az 2 oyuncu gerekli.");
return;
}

players=[];

[p1,p2,p3,p4].forEach(name=>{
if(name){
players.push({
name:name,
health:7,
shield:0
});
}
});

document.getElementById("setup").classList.add("hidden");
document.getElementById("game").classList.remove("hidden");

renderPlayers();
}

function renderPlayers(){

const area=document.getElementById("players");
area.innerHTML="";

players.forEach((player,index)=>{

area.innerHTML+=`
<div class="player">

<h2>${player.name}</h2>

<div class="stats">
❤️ ${player.health}/7
</div>

<div class="controls">
<button class="minus" onclick="healthDown(${index})">- Can</button>
<button class="plus" onclick="healthUp(${index})">+ Can</button>
</div>

<div class="stats">
🛡️ ${player.shield}/3
</div>

<div class="controls">
<button class="minus" onclick="shieldDown(${index})">- Kalkan</button>
<button class="plus" onclick="shieldUp(${index})">+ Kalkan</button>
</div>

</div>
`;
});

}

function healthUp(i){
if(players[i].health<7){
players[i].health++;
renderPlayers();
}
}

function healthDown(i){
if(players[i].health>0){
players[i].health--;
renderPlayers();
}
}

function shieldUp(i){
if(players[i].shield<3){
players[i].shield++;
renderPlayers();
}
}

function shieldDown(i){
if(players[i].shield>0){
players[i].shield--;
renderPlayers();
}
}

function changeTurn(v){

let t=document.getElementById("turn");

let current=parseInt(t.innerText);

current+=v;

if(current<1) current=1;

t.innerText=current;
}

</script>

</body>
</html>
